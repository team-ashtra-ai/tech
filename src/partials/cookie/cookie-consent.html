<section class="cookie-banner" data-cookie-banner hidden aria-label="Cookie preferences">
  <div>
    <h2>{{title}}</h2>
    <p>{{body}}</p>
    <div class="cookie-options" data-cookie-options hidden>
      {{categories}}
    </div>
  </div>
  <div class="cookie-actions">
    <button class="btn btn-secondary" type="button" data-cookie-reject>{{reject}}</button>
    <button class="btn btn-secondary" type="button" data-cookie-manage>{{manage}}</button>
    <button class="btn btn-primary" type="button" data-cookie-accept>{{accept}}</button>
    <button class="btn btn-primary" type="button" data-cookie-save hidden>{{save}}</button>
  </div>
</section>
