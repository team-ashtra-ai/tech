<a class="skip-link" href="#main">{{skip_label}}</a>
<header class="site-header" data-site-header>
  {{theme_preview_bar}}
  <div class="utility-bar">
    <div class="container utility-shell">
      <span class="utility-line">{{utility_label}}</span>
      <div class="utility-controls">
        {{language_switcher}}
        <a class="utility-link" href="{{accessibility_url}}">{{accessibility_label}}</a>
      </div>
    </div>
  </div>
  <div class="container header-shell">
    <a class="brand" href="{{home_url}}" aria-label="{{home_label}}">
      {{logo_markup}}
    </a>
    {{nav_desktop}}
    <div class="header-actions">
      <a class="btn btn-primary" data-track="cta_click" href="{{cta_url}}">{{cta_label}}</a>
      <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false" aria-controls="mobile-menu" aria-label="{{menu_label}}"><span></span><span></span><span></span></button>
    </div>
  </div>
  {{nav_mobile}}
</header>
