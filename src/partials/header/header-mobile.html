<div class="mobile-panel" id="mobile-menu" data-mobile-menu role="dialog" aria-modal="true" aria-label="{{menu_panel_label}}" tabindex="-1" hidden>
  <div class="mobile-panel-head">
    <a class="brand" href="{{home_url}}" aria-label="{{home_label}}">
      {{logo_markup}}
    </a>
    <button class="mobile-close" type="button" data-menu-close aria-label="{{close_label}}">×</button>
  </div>
  <div class="mobile-panel-body">
    {{items}}
  </div>
  <div class="mobile-panel-footer">
    <a class="btn btn-primary" data-track="cta_click" href="{{cta_url}}">{{cta_label}}</a>
  </div>
</div>
