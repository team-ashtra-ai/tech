<div class="theme-demo-bar">
  <div class="container theme-demo-shell">
    <div class="theme-demo-copy">
      <span class="theme-demo-label">{{label}}</span>
      <p class="theme-demo-summary" data-theme-summary>{{summary}}</p>
    </div>
    <nav class="theme-switcher" aria-label="{{switcher_label}}" data-theme-switcher>
      {{items}}
    </nav>
    <span class="sr-only" aria-live="polite" data-theme-announcer>{{announcement}}</span>
  </div>
</div>
